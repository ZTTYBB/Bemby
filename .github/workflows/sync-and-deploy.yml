name: Sync Upstream & Deploy to HF

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream (liveinaus/Bemby)
        id: sync
        run: |
          PREV=$(git rev-parse HEAD)
          git remote add upstream https://github.com/liveinaus/Bemby.git
          git fetch upstream --no-tags --quiet
          git merge upstream/main --no-edit --allow-unrelated-histories 2>&1 || true
          NOW=$(git rev-parse HEAD)
          if [ "$PREV" = "$NOW" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push merged changes
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git push origin main

      - name: Build and push Docker image to HF Registry
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "$HF_TOKEN" | docker login -u ZTTYBB --password-stdin registry.huggingface.co
          docker build -t registry.huggingface.co/ZTTYBB/bemby:latest .
          docker push registry.huggingface.co/ZTTYBB/bemby:latest

      - name: Update HF Space Dockerfile and trigger rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/ZTTYBB/bemby /tmp/hf-update
          cd /tmp/hf-update
          git config user.name "ZTTYBB"
          git config user.email "ztyybb@users.noreply.huggingface.co"

          # Write Dockerfile using echo to avoid heredoc indentation issues in YAML
          echo "FROM registry.huggingface.co/ZTTYBB/bemby:latest" > Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN mkdir -p /app/data && chown -R node:node /app" >> Dockerfile
          echo "USER node" >> Dockerfile
          echo "EXPOSE 3000" >> Dockerfile
          echo "ENV PORT=3000" >> Dockerfile
          echo 'CMD ["node", "--dns-result-order=ipv4first", "dist/server.js"]' >> Dockerfile

          git add Dockerfile
          git commit -m "Update to latest build $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin main
