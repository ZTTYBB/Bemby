name: Sync Upstream & Deploy to HF

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream (liveinaus/Bemby)
        id: sync
        run: |
          PREV=$(git rev-parse HEAD)
          git remote add upstream https://github.com/liveinaus/Bemby.git
          git fetch upstream --no-tags --quiet
          git merge upstream/main --no-edit --allow-unrelated-histories 2>&1 || true
          NOW=$(git rev-parse HEAD)
          if [ "$PREV" = "$NOW" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push merged changes
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git push origin main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ZTTYBB
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/ztyybb/bemby:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update HF Space Dockerfile and trigger rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Updating HF Space Dockerfile..."
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/ZTTYBB/bemby /tmp/hf-update 2>&1
          cd /tmp/hf-update
          git config user.name "ZTTYBB"
          git config user.email "ztyybb@users.noreply.huggingface.co"

          echo "FROM ghcr.io/ztyybb/bemby:latest" > Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN mkdir -p /app/data && chown -R node:node /app" >> Dockerfile
          echo "USER node" >> Dockerfile
          echo "EXPOSE 3000" >> Dockerfile
          echo "ENV PORT=3000" >> Dockerfile
          echo 'CMD ["node", "--dns-result-order=ipv4first", "dist/server.js"]' >> Dockerfile

          git add Dockerfile
          git commit -m "Update to latest build $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin main 2>&1
